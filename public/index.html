<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube to MP3</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .container { width: 100%; max-width: 580px; }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .logo-icon {
      width: 40px; height: 40px;
      background: #ff0000;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.5px; }

    .subtitle {
      text-align: center;
      color: #777;
      font-size: 0.875rem;
      margin-bottom: 36px;
    }

    .search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    input[type="text"] {
      flex: 1;
      padding: 13px 16px;
      background: #1c1c1c;
      border: 1.5px solid #2e2e2e;
      border-radius: 10px;
      color: #e8e8e8;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: #ff4444; }
    input[type="text"]::placeholder { color: #555; }

    .btn-go {
      padding: 13px 22px;
      background: #ff2020;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, opacity 0.15s, transform 0.1s;
    }
    .btn-go:hover:not(:disabled) { background: #e00; }
    .btn-go:active { transform: scale(0.97); }
    .btn-go:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .card {
      background: #181818;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      overflow: hidden;
      display: none;
    }
    .card.show { display: block; }

    .video-row {
      display: flex;
      gap: 14px;
      padding: 16px;
      align-items: center;
    }
    .thumb {
      width: 116px; height: 66px;
      object-fit: cover;
      border-radius: 7px;
      flex-shrink: 0;
      background: #2a2a2a;
    }
    .video-meta { flex: 1; min-width: 0; }
    .video-title {
      font-weight: 600;
      font-size: 0.9rem;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 5px;
    }
    .video-sub { color: #777; font-size: 0.8rem; }

    .action-row {
      padding: 14px 16px 16px;
      border-top: 1px solid #252525;
    }

    .btn-dl {
      display: block;
      width: 100%;
      padding: 14px;
      background: #ff2020;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn-dl:hover:not(:disabled) { background: #e00; }
    .btn-dl:disabled { opacity: 0.45; cursor: not-allowed; }

    /* spinner inside button */
    .btn-dl .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: #1f0f0f;
      border: 1px solid #5a1a1a;
      color: #ff8080;
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
      line-height: 1.4;
    }
    .error-box.show { display: block; }

    footer {
      margin-top: 40px;
      color: #444;
      font-size: 0.75rem;
      text-align: center;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-icon">♪</div>
      <h1>YT to MP3</h1>
    </div>
    <p class="subtitle">Convert public YouTube videos to MP3 — free, no signup</p>

    <div class="search-row">
      <input type="text" id="urlInput" placeholder="Paste YouTube URL…" autocomplete="off" />
      <button class="btn-go" id="fetchBtn" onclick="fetchInfo()">Go</button>
    </div>

    <div class="error-box" id="errorBox"></div>

    <div class="card" id="card">
      <div class="video-row">
        <img class="thumb" id="thumb" src="" alt="" />
        <div class="video-meta">
          <div class="video-title" id="videoTitle"></div>
          <div class="video-sub" id="videoSub"></div>
        </div>
      </div>
      <div class="action-row">
        <button class="btn-dl" id="dlBtn" onclick="downloadMp3()">Download MP3</button>
      </div>
    </div>

    <footer>
      Audio is converted on the server — nothing is stored permanently.<br>
      Best for videos under 15 minutes · Public videos only
    </footer>
  </div>

  <script>
    function $(id) { return document.getElementById(id); }

    function showError(msg) {
      $('errorBox').textContent = msg;
      $('errorBox').classList.add('show');
    }
    function clearError() { $('errorBox').classList.remove('show'); }

    function fmt(s) {
      const m = Math.floor(s / 60), sec = s % 60;
      return `${m}:${String(sec).padStart(2, '0')}`;
    }

    let currentUrl = '';
    let currentTitle = '';

    async function fetchInfo() {
      clearError();
      const url = $('urlInput').value.trim();
      if (!url) return showError('Paste a YouTube URL first.');

      currentUrl = url;
      const btn = $('fetchBtn');
      btn.disabled = true;
      btn.textContent = '…';
      $('card').classList.remove('show');

      try {
        const res = await fetch(`/api/info?url=${encodeURIComponent(url)}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to load video info.');

        currentTitle = data.title;
        $('thumb').src = data.thumbnail;
        $('videoTitle').textContent = data.title;
        $('videoSub').textContent = `${data.author} · ${fmt(data.duration)}`;
        $('dlBtn').disabled = false;
        $('dlBtn').textContent = 'Download MP3';
        $('card').classList.add('show');
      } catch (e) {
        showError(e.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Go';
      }
    }

    async function downloadMp3() {
      const btn = $('dlBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Converting…';

      try {
        const res = await fetch(`/api/download?url=${encodeURIComponent(currentUrl)}`);
        if (!res.ok) {
          const e = await res.json().catch(() => ({ error: 'Download failed.' }));
          throw new Error(e.error || 'Download failed.');
        }

        const blob = await res.blob();
        const objUrl = URL.createObjectURL(blob);
        const safe = currentTitle.replace(/[^\w\s\-]/g, '').trim() || 'audio';

        const a = document.createElement('a');
        a.href = objUrl;
        a.download = `${safe}.mp3`;
        a.click();
        URL.revokeObjectURL(objUrl);

        btn.textContent = 'Download MP3';
      } catch (e) {
        showError(e.message);
        btn.textContent = 'Download MP3';
      } finally {
        btn.disabled = false;
      }
    }

    $('urlInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') fetchInfo();
    });
  </script>
</body>
</html>
